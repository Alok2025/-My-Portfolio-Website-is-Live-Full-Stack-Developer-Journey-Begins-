<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alok Kharwar --Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />

    <!-- Boxicons CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li active>Home</li>
          <li>Skills</li>
          <li>Project</li>
          <li>Abouts</li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="container">
        <div class="hero"></div>
        <div class="intro">
          <h1>
            I Am '<br />
            <span class="name">ALOK KHRAWRA</span>
            <p class="">
              Aspiring Full Stack Developer with experience in web development,
              machine learning, and SEO. Passionate about building modern
              applications and continuously learning new technologies !
            </p>
            <div class="typing-container">
              <h2 class="professions" id="typing"></h2>
            </div>
          </h1>

          <div class="social-media">
            <h2 class="social">
              <a href="https://www.instagram.com/codexgammer?igsh=MW5lZzU3d2VlaGR6NA=="><i class="fa-brands fa-square-instagram"></i></a>
              <a href="https://www.linkedin.com/in/alok-kharwar-dev?utm_source=share_via&utm_content=profile&utm_medium=member_android"><i class="fa-brands fa-linkedin-in"></i></a>
              <a href="https://www.youtube.com/@codeXgammer-Zone"><i class="fa-brands fa-youtube"></i></a>
              <a href="#"><i class="fa-brands fa-square-whatsapp"></i></a>
            </h2>
          </div>
        </div>
      </div>
    </main>

    <script>
      const roles = [
        "Software Developer . . !",
        "SEO On-Page & Off-Page . . !",
        "Web Developer . . !",
      ];

      let i = 0; // role index
      let j = 0; // character index
      let currentText = "";
      let isDeleting = false;

      function type() {
        currentText = roles[i];

        if (!isDeleting) {
          document.getElementById("typing").innerText = currentText.substring(
            0,
            j++,
          );
        } else {
          document.getElementById("typing").innerText = currentText.substring(
            0,
            j--,
          );
        }

        let speed = 150;

        if (isDeleting) speed = 50;

        if (j === currentText.length + 1) {
          isDeleting = true;
          speed = 1000; // pause
        } else if (j === 0) {
          isDeleting = false;
          i = (i + 1) % roles.length;
        }

        setTimeout(type, speed);
      }

      type();
    </script>
  </body>
</html>
